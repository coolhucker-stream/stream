version: "3.8"

services:
  api:
    image: aplatonovnet/streaming-api:latest
    container_name: streaming_api_prod
    ports:
      - "8080:80"   # HTTP (изменен с 80 на 8080 для избежания конфликтов)
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:80
      - ASPNETCORE_FORWARDEDHEADERS_ENABLED=true
    volumes:
      - ./data:/app/data
      - ./certs:/app/certs  # SSL сертификаты
    networks:
      - streaming-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:80/api/streaming/test || wget -q --tries=1 --spider http://localhost:80/api/streaming/test || exit 1"]
      interval: 45s  # Увеличено
      timeout: 15s   # Увеличено
      retries: 5     # Увеличено
      start_period: 60s  # Увеличено

  rtmp-server:
    image: aplatonovnet/streaming-rtmp:latest
    container_name: rtmp_server_prod
    ports:
      - "1935:1935"  # RTMP
      - "8081:8000"  # HTTP для плейбека (изменен с 8080 на 8081)
    environment:
      - DEV_MODE=false
      - API_URL=http://api:80
    volumes:
      - ./media:/usr/src/app/media
    depends_on:
      api:
        condition: service_started  # Изменено с service_healthy
    networks:
      - streaming-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000 || nc -z localhost 8000 || exit 1"]
      interval: 45s  # Увеличено
      timeout: 15s   # Увеличено
      retries: 5     # Увеличено
      start_period: 60s  # Увеличено

  networks:
  streaming-network:
    driver: bridge

volumes:
  data:
    driver: local
  media:
    driver: local