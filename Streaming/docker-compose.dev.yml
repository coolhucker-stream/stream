version: '3.8'

services:
  rtmp-server:
    build:
      context: .
      dockerfile: Dockerfile.rtmp
    image: aplatonovnet/streaming-rtmp:latest
    container_name: rtmp_server_dev
    ports:
      - "1935:1935"  # RTMP
      - "8081:8000"  # HTTP для плейбека
    environment:
      - DEV_MODE=true  # Development mode - no validation
      # When you want the RTMP container to call the API running on the host (e.g. Visual Studio),
      # use host.docker.internal and the host port where the API is listening (here: 5082).
      - API_URL=http://host.docker.internal:8080
    volumes:
      - ./media:/usr/src/app/media
    depends_on:
      api:
        condition: service_started
    networks:
      - streaming-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000 || nc -z localhost 8000 || exit 1"]
      interval: 45s
      timeout: 15s
      retries: 5
      start_period: 60s

networks:
  streaming-network:
    driver: bridge

volumes:
  data:
    driver: local
  media:
    driver: local