version: "3.8"

services:
  api:
    image: aplatonovnet/streaming-api:latest
    container_name: streaming_api_prod
    ports:
      - "80:80"   # HTTP
      - "443:443" # HTTPS (если настроен SSL)
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:80
      - ASPNETCORE_FORWARDEDHEADERS_ENABLED=true
    volumes:
      - ./data:/app/data
      - ./certs:/app/certs  # SSL сертификаты
    networks:
      - streaming-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:80/api/streaming/test || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  rtmp-server:
    image: aplatonovnet/streaming-rtmp:latest
    container_name: rtmp_server_prod
    ports:
      - "1935:1935"  # RTMP
      - "8080:8000"  # HTTP для плейбека (избегаем конфликта с портом 80)
    environment:
      - DEV_MODE=false
      - API_URL=http://api:80
    volumes:
      - ./media:/usr/src/app/media
    depends_on:
      api:
        condition: service_healthy
    networks:
      - streaming-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Nginx reverse proxy (опционально, для SSL и статики)
  nginx:
    image: nginx:alpine
    container_name: nginx_proxy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/nginx/certs:ro
      - ./static:/var/www/static:ro
    depends_on:
      - api
      - rtmp-server
    networks:
      - streaming-network
    restart: unless-stopped

networks:
  streaming-network:
    driver: bridge

volumes:
  data:
    driver: local
  media:
    driver: local